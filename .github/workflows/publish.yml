name: Publish to npm

on:
  release:
    types:
      - published

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify npm auth token is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NODE_AUTH_TOKEN secret is not set. Add an npm access token as a repository secret named NODE_AUTH_TOKEN (Settings → Secrets and variables → Actions)."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
